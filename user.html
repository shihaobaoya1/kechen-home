<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding-top: 100px; font-family: sans-serif; }
        .box { background: #111; display: inline-block; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 350px; }
        img { width: 80px; border-radius: 50%; border: 2px solid #61dafb; margin-bottom: 20px; }
        .info { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; }
        button { background: #ff4757; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <img id="u-img" src="">
        <h2 id="u-name" style="color:#61dafb"></h2>
        <div class="info">邮箱：<span id="u-mail"></span></div>
        <button onclick="localStorage.clear(); location.href='index.html';">彻底退出并清除缓存</button>
        <a href="index.html" style="color:#888; display:block; margin-top:20px; text-decoration:none; font-size:13px;">返回首页</a>
    </div>
    <script>
        window.onload = () => {
            if(!localStorage.getItem("u_name")) { location.href='index.html'; return; }
            document.getElementById("u-name").innerText = localStorage.getItem("u_name");
            document.getElementById("u-mail").innerText = localStorage.getItem("u_email");
            document.getElementById("u-img").src = localStorage.getItem("u_pic");
        };
    </script>
</body>
</html>            <span id="p-key" class="value key-text"></span>
        </div>

        <button class="logout-btn" onclick="doLogout()">安全退出</button>
    </div>

    <script>
        // 加载用户数据
        window.onload = function() {
            const name = localStorage.getItem("u_name");
            if (!name) {
                location.href = "index.html";
                return;
            }
            document.getElementById("p-name").innerText = name;
            document.getElementById("p-email").innerText = localStorage.getItem("u_email");
            document.getElementById("p-img").src = localStorage.getItem("u_pic");
            document.getElementById("p-time").innerText = localStorage.getItem("u_time");
            document.getElementById("p-key").innerText = localStorage.getItem("u_key");
        };

        // 退出登录
        function doLogout() {
            if(confirm("确定要退出并清除本地缓存吗？")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
