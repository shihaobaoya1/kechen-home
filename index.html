<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浩宝呀的个人站</title>
    <style>
        /* 强制隐藏所有 Google 可能生成的容器 */
        #credential_picker_container, [id*="google-one-tap"], .fixed-top-right { display: none !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Microsoft YaHei", sans-serif; }

        nav { position: fixed; top: 20px; right: 40px; z-index: 20000; }
        #user-btn { 
            display: none; background: #61dafb; color: #000; 
            padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; 
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 穿透点击 */
        }
        #typewriter { font-size: 3.5rem; border-right: 3px solid #61dafb; min-height: 4.5rem; }

        .post-list { 
            position: relative; z-index: 10000; 
            max-width: 850px; margin: -100px auto 100px; padding: 0 20px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.95); border: 1px solid #333; padding: 30px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 25px;
        }
        .card:hover { border-color: #61dafb; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav>
        <div id="g-login-btn"></div>
        <div id="user-btn" onclick="location.href='user.html'"></div>
    </nav>

    <div class="hero">
        <h1 id="typewriter"></h1>
    </div>

    <div class="post-list">
        <div class="card" onclick="location.href='post1.html'">
            <h3>我的文章</h3>
            <p>如果点击能跳转，层级就对了。如果登录后没横条，弹窗就杀了。</p>
        </div>
    </div>

    <script>
        // 1. 打字机
        const text = "你好，我是浩宝呀";
        let idx = 0;
        function type() {
            if (idx < text.length) {
                document.getElementById("typewriter").innerText += text.charAt(idx);
                idx++;
                setTimeout(type, 500);
            }
        }

        // 2. 核心逻辑：只有没登录时，才【动态加载】Google 脚本
        window.onload = () => {
            type();
            const savedName = localStorage.getItem("u_name");

            if (savedName) {
                // 已登录：显示按钮，【绝对不加载】Google 脚本
                const btn = document.getElementById("user-btn");
                btn.style.display = "block";
                btn.innerText = "欢迎，" + savedName;
                console.log("已登录状态，跳过 Google 脚本加载，彻底杜绝弹窗。");
            } else {
                // 未登录：动态插入 Google 脚本
                const script = document.createElement('script');
                script.src = "https://accounts.google.com/gsi/client";
                script.async = true;
                script.defer = true;
                script.onload = () => {
                    google.accounts.id.initialize({
                        client_id: "221293974861-0dj6irr35a8q05f8scq2dog1k0gklmcv.apps.googleusercontent.com",
                        callback: onSignIn,
                        auto_select: false,
                        itp_support: true
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("g-login-btn"),
                        { theme: "outline", size: "large", shape: "pill" }
                    );
                };
                document.head.appendChild(script);
            }
        };

        function onSignIn(resp) {
            const user = JSON.parse(atob(resp.credential.split('.')[1]));
            localStorage.setItem("u_name", user.name);
            localStorage.setItem("u_email", user.email);
            localStorage.setItem("u_pic", user.picture);
            location.reload();
        }
    </script>
</body>
</html>
