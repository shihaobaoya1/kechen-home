<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浩宝呀的个人站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Microsoft YaHei", sans-serif; }

        /* 导航栏：确保在最顶层 */
        nav { position: fixed; top: 20px; right: 40px; z-index: 20000; }
        #user-info { 
            display: none; background: #61dafb; color: #000; 
            padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(97,218,251,0.4);
        }

        /* 封面：解决“点不动”的关键 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 重要：让点击穿透到下层 */
        }
        #typewriter { font-size: 3.5rem; border-right: 3px solid #61dafb; min-height: 4.5rem; color: #fff; }

        /* 文章列表：确保层级足够高 */
        .post-list { 
            position: relative; z-index: 10000; 
            max-width: 850px; margin: -100px auto 100px; padding: 0 20px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.95); border: 1px solid #333; padding: 30px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s;
            margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .card:hover { border-color: #61dafb; transform: translateY(-10px); background: #1a1a1a; }
        .card h3 { color: #61dafb; margin-bottom: 12px; }
    </style>
</head>
<body>

    <nav>
        <div id="auth-target"></div>
        <div id="user-info" onclick="location.href='user.html'"></div>
    </nav>

    <div class="hero">
        <h1 id="typewriter"></h1>
    </div>

    <div class="post-list">
        <h2 style="margin-bottom:25px; color:#555; font-size: 1.2rem; letter-spacing: 4px;">POSTS</h2>
        
        <div class="card" onclick="location.href='post1.html'">
            <h3>我的极简博客上线了</h3>
            <p style="color:#888;">如果你能看到这个卡片并点击跳转，说明层级修复成功了。登录后如果不弹出白色横条，说明逻辑修复成功了。</p>
        </div>
    </div>

    <script>
        // 1. 打字机
        const text = "你好，我是浩宝呀";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerText += text.charAt(i);
                i++;
                setTimeout(type, 500);
            }
        }

        // 2. 权限逻辑：强制干掉 One Tap
        function handleAuth() {
            const savedName = localStorage.getItem("u_name");
            
            if (savedName) {
                // 已登录：显示 UI，绝不加载 Google 脚本
                const ui = document.getElementById("user-info");
                ui.style.display = "block";
                ui.innerText = "欢迎，" + savedName;
            } else {
                // 未登录：才去加载 Google 脚本
                const gScript = document.createElement('script');
                gScript.src = "https://accounts.google.com/gsi/client";
                gScript.async = true;
                gScript.defer = true;
                gScript.onload = () => {
                    google.accounts.id.initialize({
                        client_id: "221293974861-0dj6irr35a8q05f8scq2dog1k0gklmcv.apps.googleusercontent.com",
                        callback: onSignIn,
                        auto_select: false,
                        itp_support: true 
                    });
                    // 只渲染显性按钮，绝对不调用 prompt()
                    google.accounts.id.renderButton(
                        document.getElementById("auth-target"),
                        { theme: "outline", size: "large", shape: "pill" }
                    );
                };
                document.head.appendChild(gScript);
            }
        }

        function onSignIn(resp) {
            const user = JSON.parse(atob(resp.credential.split('.')[1]));
            localStorage.setItem("u_name", user.name);
            localStorage.setItem("u_email", user.email);
            localStorage.setItem("u_pic", user.picture);
            localStorage.setItem("u_time", new Date().toLocaleString());
            location.reload(); 
        }

        window.onload = () => {
            type();
            handleAuth();
        };
    </script>
</body>

</body>
</html>
