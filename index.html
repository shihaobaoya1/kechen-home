<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浩宝呀的个人站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Microsoft YaHei", sans-serif; overflow-x: hidden; }

        /* 导航栏 */
        nav { position: fixed; top: 20px; right: 40px; z-index: 10001; }
        #user-info { 
            display: none; background: #61dafb; color: #000; 
            padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(97,218,251,0.3);
        }

        /* 封面 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center; pointer-events: none; /* 让封面不阻挡点击 */
        }
        #typewriter { font-size: 3.5rem; border-right: 3px solid #61dafb; min-height: 4.5rem; color: #fff; }

        /* 文章列表 - 核心修复：确保层级最高且不被遮挡 */
        .post-list { 
            position: relative; z-index: 9999; 
            max-width: 850px; margin: -100px auto 100px; padding: 0 20px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.9); border: 1px solid #333; padding: 30px; 
            border-radius: 15px; cursor: pointer; transition: all 0.3s ease;
            margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .card:hover { border-color: #61dafb; transform: translateY(-10px); background: rgba(40, 40, 40, 0.9); }
        .card h3 { color: #61dafb; margin-bottom: 12px; font-size: 1.5rem; }
        .card p { color: #bbb; line-height: 1.6; }
    </style>
</head>
<body>

    <nav>
        <div id="auth-container"></div>
        <div id="user-info" onclick="location.href='user.html'"></div>
    </nav>

    <div class="hero">
        <h1 id="typewriter"></h1>
    </div>

    <div class="post-list">
        <h2 style="margin-bottom:25px; color:#555; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 4px;">Latest Articles</h2>
        
        <div class="card" onclick="location.href='post1.html'">
            <h3>我的极简博客上线了</h3>
            <p>点击此处跳转文章。我们修复了登录弹窗残留和页面层级遮挡的问题，现在点击体验更加顺滑。</p>
        </div>
    </div>

    <script>
        // 1. 打字机逻辑
        const text = "你好，我是浩宝呀";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerText += text.charAt(i);
                i++;
                setTimeout(type, 500);
            }
        }

        // 2. 登录与状态控制
        const CLIENT_ID = "221293974861-0dj6irr35a8q05f8scq2dog1k0gklmcv.apps.googleusercontent.com";

        function initAuth() {
            const name = localStorage.getItem("u_name");
            
            if (name) {
                // 已登录：直接显示名字，不加载 Google 任何东西
                const info = document.getElementById("user-info");
                info.style.display = "block";
                info.innerText = "欢迎，" + name;
            } else {
                // 未登录：动态加载 Google 脚本和渲染按钮
                const script = document.createElement('script');
                script.src = "https://accounts.google.com/gsi/client";
                script.async = true;
                script.defer = true;
                script.onload = () => {
                    google.accounts.id.initialize({
                        client_id: CLIENT_ID,
                        callback: onSignIn,
                        auto_select: false // 禁用自动选择，减少弹窗干扰
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("auth-container"),
                        { theme: "outline", size: "large", shape: "pill" }
                    );
                };
                document.head.appendChild(script);
            }
        }

        function onSignIn(resp) {
            const user = JSON.parse(atob(resp.credential.split('.')[1]));
            localStorage.setItem("u_name", user.name);
            localStorage.setItem("u_email", user.email);
            localStorage.setItem("u_pic", user.picture);
            localStorage.setItem("u_time", new Date().toLocaleString());
            location.reload(); 
        }

        window.onload = () => {
            type();
            initAuth();
        };
    </script>
</body>
</html>
