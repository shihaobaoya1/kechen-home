<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        /* 基础样式复位 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f4f7f6; color: #333; line-height: 1.6; }

        /* 1. 全屏封面区 */
        .header {
            height: 100vh;
            /* 使用你提供的图片链接 */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            position: relative;
        }

        /* 打字机文字样式 */
        .header h1 { 
            font-size: 3.5rem; 
            margin-bottom: 1rem; 
            min-height: 4.5rem; /* 防止文字跳动 */
            border-right: 3px solid #61dafb; /* 模拟光标 */
            padding-right: 5px;
            display: inline-block;
        }

        /* 光标闪烁动画 */
        .cursor-blink {
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        .header p { font-size: 1.2rem; opacity: 0.9; letter-spacing: 1px; }

        /* 2. 动态下箭头 */
        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            animation: bounce 2s infinite;
            text-decoration: none;
            opacity: 0.8;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* 3. 文章列表内容区 */
        .container { max-width: 850px; margin: 0 auto; padding: 60px 20px; }
        .section-title { margin-bottom: 40px; font-size: 1.8rem; position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; width: 50px; height: 3px; background: #61dafb; position: absolute; bottom: 0; left: 0; }

        .post-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .post-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .post-card h2 { margin-bottom: 12px; color: #2c3e50; }
        .post-card .date { color: #95a5a6; font-size: 0.85rem; margin-bottom: 15px; display: block; }
        .post-card p { color: #7f8c8d; font-size: 1rem; }

        footer { text-align: center; padding: 50px; color: #bdc3c7; background: #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <h1 id="typewriter" class="cursor-blink"></h1>
        <p>心有所信，方能远行</p>
        <a href="#content" class="scroll-down">↓</a>
    </header>

    <main id="content" class="container">
        <h2 class="section-title">最新发布</h2>

        <article class="post-card">
            <span class="date">2026年3月27日</span>
            <h2>我的极简博客上线了</h2>
            <p>这个页面完全通过 GitHub 网页端编辑，跳过了所有复杂的本地配置。使用了自定义背景图和打字机特效。</p>
        </article>

        <article class="post-card">
            <span class="date">2026年3月25日</span>
            <h2>关于 ParticleX 与 Smackdown 风格</h2>
            <p>融合了粒子效果的灵感与 Smackdown 的全屏布局，这正是我想追求的视觉效果。</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 你的名字 | Powered by GitHub Pages</p>
    </footer>

    <script>
        // --- 打字机效果设置 ---
        const text = "你好，我是你的名字"; // 这里改你想显示的文字
        const speed = 2000; // 2000毫秒（2秒）一个字
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // 页面加载完成后开始打字
        window.onload = typeWriter;

        // --- 平滑滚动 ---
        document.querySelector('.scroll-down').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('#content').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
