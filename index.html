<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; line-height: 1.6; }
        .links a { display: inline-block; margin: 10px; color: #007bff; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 你好，我是 [你的名字]</h1>
        <p>这是我的 GitHub Pages 个人主页。</p>
        <p>我不喜欢折腾本地环境，所以我直接在 GitHub 网页上把这个页面搞定了。</p>
        <div class="links">
            <a href="https://github.com/你的用户名">我的 GitHub</a>
            <a href="mailto:your-email@example.com">联系我</a>
        </div>
    </div>
</body>
</html>
