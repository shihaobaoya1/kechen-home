<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浩宝呀的个人站</title>
    <style>
        #credential_picker_container, 
        #credential_picker_iframe,
        iframe[src*="accounts.google.com"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Microsoft YaHei", sans-serif; }

        nav { position: fixed; top: 20px; right: 40px; z-index: 10001; }
        #user-btn { 
            display: none; background: #61dafb; color: #000; 
            padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; 
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 让点击穿透到文章卡片 */
        }
        #typewriter { font-size: 3.5rem; border-right: 3px solid #61dafb; min-height: 4.5rem; }

        .post-list { 
            position: relative; z-index: 9999; 
            max-width: 850px; margin: -100px auto 100px; padding: 0 20px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.95); border: 1px solid #333; padding: 30px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 25px;
        }
        .card:hover { border-color: #61dafb; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav>
        <div id="g-login-btn"></div>
        <div id="user-btn" onclick="location.href='user.html'"></div>
    </nav>

    <div class="hero">
        <h1 id="typewriter"></h1>
    </div>

    <div class="post-list">
        <div class="card" onclick="location.href='post1.html'">
            <h3>我的极简博客上线了</h3>
            <p style="color:#888;">测试说明：如果点击这里能跳转，说明层级修复成功。如果右上角没有白色横条，说明拦截成功。</p>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // 1. 打字机
        const text = "你好，我是浩宝呀";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerText += text.charAt(i);
                i++;
                setTimeout(type, 500);
            }
        }

        // 2. 登录逻辑
        window.onload = () => {
            type();
            const name = localStorage.getItem("u_name");
            
            // 延迟一点点初始化，确保 Google 脚本加载完
            setTimeout(() => {
                if (name) {
                    // 已登录：显示按钮，彻底不再初始化 Google Prompt
                    document.getElementById("user-btn").style.display = "block";
                    document.getElementById("user-btn").innerText = "欢迎，" + name;
                    
                    // 【关键】如果发现 Google 偷偷生成了容器，直接物理切除
                    const pop = document.getElementById('credential_picker_container');
                    if(pop) pop.remove();
                } else {
                    // 未登录：才初始化
                    google.accounts.id.initialize({
                        client_id: "221293974861-0dj6irr35a8q05f8scq2dog1k0gklmcv.apps.googleusercontent.com",
                        callback: onSignIn,
                        auto_select: false, // 禁用自动弹出
                        itp_support: true
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("g-login-btn"),
                        { theme: "outline", size: "large" }
                    );
                    // 只有没登录才允许 prompt，但这里我们甚至可以不写这一行，只靠按钮登录
                    // google.accounts.id.prompt(); 
                }
            }, 500);
        };

        function onSignIn(resp) {
            const user = JSON.parse(atob(resp.credential.split('.')[1]));
            localStorage.setItem("u_name", user.name);
            localStorage.setItem("u_email", user.email);
            localStorage.setItem("u_pic", user.picture);
            location.reload();
        }
    </script>
</body>
</html>
