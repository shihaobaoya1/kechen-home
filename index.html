<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浩宝呀的个人站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Microsoft YaHei", sans-serif; }

        /* --- 核心修复 1：强制隐藏 Google 自动生成的弹窗容器 --- */
        #credential_picker_container, 
        iframe[title*="Google Privacy Policy"],
        .google-one-tap-container { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important; 
            pointer-events: none !important;
        }

        /* 导航 */
        nav { position: fixed; top: 20px; right: 40px; z-index: 20000; }
        #user-info { 
            display: none; background: #61dafb; color: #000; 
            padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; 
        }

        /* 封面：确保点击穿透 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://img.win3000.com/m00/30/24/e28b44b34f3ca55c6b3cb2b0a64c491d.jpg') no-repeat center/cover;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 必须：否则点不动下面的卡片 */
        }
        #typewriter { font-size: 3.5rem; border-right: 3px solid #61dafb; min-height: 4.5rem; }

        /* 文章列表 */
        .post-list { 
            position: relative; z-index: 10000; 
            max-width: 850px; margin: -100px auto 100px; padding: 0 20px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.95); border: 1px solid #333; padding: 30px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 25px;
        }
        .card:hover { border-color: #61dafb; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav>
        <div id="auth-target"></div>
        <div id="user-info" onclick="location.href='user.html'"></div>
    </nav>

    <div class="hero">
        <h1 id="typewriter"></h1>
    </div>

    <div class="post-list">
        <h2 style="margin-bottom:25px; color:#61dafb; letter-spacing:4px;">LATEST POSTS</h2>
        <div class="card" onclick="location.href='post1.html'">
            <h3>我的极简博客上线了</h3>
            <p>如果登录后右上角还有白色横条，请务必【彻底清除浏览器缓存】再试。</p>
        </div>
    </div>

    <script>
        // --- 核心修复 2：动态监控并秒杀弹窗 ---
        const killGooglePop = () => {
            const pop = document.getElementById('credential_picker_container');
            if (pop) pop.remove();
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(f => {
                if (f.src.includes('accounts.google.com')) f.remove();
            });
        };
        // 只要页面有动静就检查一遍，不给它弹出来的机会
        const observer = new MutationObserver(killGooglePop);
        observer.observe(document.body, { childList: true, subtree: true });

        // 打字机
        const text = "你好，我是浩宝呀";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerText += text.charAt(i);
                i++;
                setTimeout(type, 500);
            }
        }

        // 登录逻辑
        function handleAuth() {
            const savedName = localStorage.getItem("u_name");
            if (savedName) {
                document.getElementById("user-info").style.display = "block";
                document.getElementById("user-info").innerText = "欢迎，" + savedName;
                // 已登录状态下，每隔 100 毫秒强制杀一次弹窗，杀满 3 秒
                let count = 0;
                const timer = setInterval(() => {
                    killGooglePop();
                    if (count++ > 30) clearInterval(timer);
                }, 100);
            } else {
                const gScript = document.createElement('script');
                gScript.src = "https://accounts.google.com/gsi/client";
                gScript.onload = () => {
                    google.accounts.id.initialize({
                        client_id: "221293974861-0dj6irr35a8q05f8scq2dog1k0gklmcv.apps.googleusercontent.com",
                        callback: onSignIn,
                        auto_select: false
                    });
                    google.accounts.id.renderButton(document.getElementById("auth-target"), { theme: "outline" });
                };
                document.head.appendChild(gScript);
            }
        }

        function onSignIn(resp) {
            const user = JSON.parse(atob(resp.credential.split('.')[1]));
            localStorage.setItem("u_name", user.name);
            localStorage.setItem("u_email", user.email);
            localStorage.setItem("u_pic", user.picture);
            location.reload(); 
        }

        window.onload = () => { type(); handleAuth(); };
    </script>
</body>
</html>
